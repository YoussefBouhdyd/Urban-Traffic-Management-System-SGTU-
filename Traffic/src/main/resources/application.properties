# Database Configuration
db.url=jdbc:mysql://localhost:3306/integrated_traffic_system
db.username=root
db.password=

# Kafka Configuration
kafka.bootstrap.servers=localhost:9092
kafka.group.id=traffic-analysis-group
kafka.topic.camera.data=camera-data
kafka.topic.alerts=traffic-alerts
kafka.topic.recommendations=traffic-recommendations

# RMI Configuration
rmi.port=1099
rmi.service.name=CameraService

# API Server Configuration
api.host=localhost
api.port=8083

# Camera Simulator Configuration
camera.id=CAM-01
intersection.id=INT-01
camera.event.interval.seconds=5
