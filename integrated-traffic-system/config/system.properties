# ============================================================================
# Integrated Traffic System - System Configuration
# ============================================================================
# This file contains all configuration parameters for the integrated system.
# Copy this file to application.properties in each module's resources folder.
# ============================================================================

# ============================================================================
# DATABASE CONFIGURATION
# ============================================================================
# MySQL connection settings
db.url=jdbc:mysql://localhost:3306/integrated_traffic_system
db.username=root
db.password=
db.driver=com.mysql.cj.jdbc.Driver

# Connection pool settings
db.pool.min=5
db.pool.max=20
db.pool.timeout=30000

# ============================================================================
# KAFKA CONFIGURATION
# ============================================================================
# Kafka broker settings (Kafka 2.13-3.8.0)
kafka.bootstrap.servers=localhost:9092
kafka.client.id=traffic-system-client

# Producer settings
kafka.producer.acks=all
kafka.producer.retries=3
kafka.producer.compression.type=snappy
kafka.producer.max.block.ms=5000

# Consumer settings
kafka.consumer.enable.auto.commit=true
kafka.consumer.auto.commit.interval.ms=1000
kafka.consumer.session.timeout.ms=30000
kafka.consumer.max.poll.records=100

# ============================================================================
# KAFKA TOPICS
# ============================================================================
# Traffic Camera System
kafka.topic.camera.data=camera-data
kafka.topic.traffic.alerts=traffic-alerts
kafka.topic.traffic.recommendations=traffic-recommendations
kafka.group.id.traffic.analysis=traffic-analysis-group

# SOAP Services
kafka.topic.service.flux=service-flux
kafka.group.id.centrale.flux=centrale-flux-consumer

# Environmental Monitoring
kafka.topic.pollution=pollution-topic
kafka.topic.noise=bruit-topic
kafka.group.id.pollution=pollution-consumer-group
kafka.group.id.noise=bruit-consumer-group

# ============================================================================
# RMI CONFIGURATION
# ============================================================================
# RMI Registry settings for camera remote service
rmi.port=1099
rmi.service.name=CameraService
rmi.host=localhost

# ============================================================================
# REST API CONFIGURATION
# ============================================================================
# Traffic Camera API
api.camera.host=localhost
api.camera.port=8080
api.camera.base.path=/api/traffic

# Central WebApp API (Tomcat)
api.central.host=localhost
api.central.port=9999
api.central.base.path=/centrale/api

# Pollution Service API
api.pollution.host=localhost
api.pollution.port=8082
api.pollution.base.path=/api/pollution

# ============================================================================
# SOAP SERVICES CONFIGURATION
# ============================================================================
# Service Flux (Traffic Flow)
soap.flux.host=localhost
soap.flux.port=8080
soap.flux.endpoint=http://localhost:8080/ServiceFlux
soap.flux.wsdl=http://localhost:8080/ServiceFlux?wsdl

# Service Feux (Traffic Lights)
soap.feux.host=localhost
soap.feux.port=8081
soap.feux.endpoint=http://localhost:8081/ServiceFeux
soap.feux.wsdl=http://localhost:8081/ServiceFeux?wsdl

# ============================================================================
# TCP SERVICE CONFIGURATION
# ============================================================================
# Noise Service (TCP Socket)
tcp.noise.host=localhost
tcp.noise.port=5000
tcp.noise.backlog=50
tcp.noise.timeout=30000

# ============================================================================
# SIMULATION CONFIGURATION
# ============================================================================
# Camera Simulator
camera.id=CAM-01
camera.intersection.id=INT-01
camera.event.interval.seconds=5
camera.simulation.enabled=true

# Multiple cameras configuration
cameras.count=4
cameras.prefix=CAM-
intersections.prefix=INT-

# Traffic Flow Simulator
flux.routes=nord,sud,est,ouest
flux.update.interval.seconds=5
flux.min.value=0
flux.max.value=100

# Pollution Simulator
pollution.zones=Zone_Centre,Zone_Nord,Zone_Sud
pollution.update.interval.seconds=10
pollution.min.co2=30.0
pollution.max.co2=120.0

# Noise Simulator
noise.zones=Zone_Centre,Zone_Nord,Zone_Sud
noise.update.interval.seconds=10
noise.min.decibels=60.0
noise.max.decibels=100.0

# ============================================================================
# ALERT THRESHOLDS
# ============================================================================
# Traffic alerts
alert.traffic.congestion.threshold=80
alert.traffic.speed.min=10.0
alert.traffic.stopped.vehicles.threshold=5

# Pollution alerts
alert.pollution.co2.high=100.0
alert.pollution.co2.medium=80.0
alert.pollution.co2.low=60.0

# Noise alerts
alert.noise.high=90.0
alert.noise.medium=85.0
alert.noise.low=75.0

# ============================================================================
# LOGGING CONFIGURATION
# ============================================================================
# Log levels
log.level.root=INFO
log.level.com.smartcity=DEBUG
log.level.com.traffic=DEBUG
log.level.service=DEBUG

# Log file settings
log.file.path=./logs
log.file.max.size=10MB
log.file.max.history=30

# ============================================================================
# PERFORMANCE TUNING
# ============================================================================
# Thread pool settings
thread.pool.core.size=10
thread.pool.max.size=50
thread.pool.queue.capacity=100

# Cache settings
cache.enabled=true
cache.ttl.seconds=300
cache.max.entries=1000

# ============================================================================
# SECURITY CONFIGURATION (if needed)
# ============================================================================
# CORS settings
cors.enabled=true
cors.allowed.origins=http://localhost:3000,http://localhost:8080
cors.allowed.methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed.headers=*

# ============================================================================
# MONITORING & HEALTH CHECK
# ============================================================================
# Health check endpoints
health.check.enabled=true
health.check.interval.seconds=60

# Metrics
metrics.enabled=true
metrics.export.interval.seconds=60

# ============================================================================
# END OF CONFIGURATION
# ============================================================================
